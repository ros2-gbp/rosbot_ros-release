---
launch:

  - arg:
      name: config_dir
      default: ''
      description: Path to the common configuration directory. You can create such common configuration
        directory with `ros2 run rosbot_utils create_config_dir {directory}`.

  - arg:
      name: led_strip
      default: 'True'
      description: ROSbot XL only. Enable or disable the LED strip.
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: hardware_bridge
      default: 'True'
      description: Launch the SBC<->MCU bridge (selected by backend). Set to 'False' to skip it entirely
        (e.g. when running the bridge/agent in a separate container).
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: backend
      default: mavlink
      description: Which MCU<->SBC protocol stack the hardware bridge speaks. 'mavlink' (default) starts
        the rosbot_mavlink_bridge node; 'microros' starts the XRCE-DDS agent (compatible with the legacy
        micro-ROS-only firmware). Requires the runtime-switch firmware variant on the MCU.
      choice:
        - value: microros
        - value: mavlink

  - arg:
      name: namespace
      default: $(env ROBOT_NAMESPACE '')
      description: Add namespace to all launched nodes.

  - arg:
      name: tf_namespace_bridge
      default: 'True'
      description: Bridge robot's namespaced TF to the global /tf and /tf_static.
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: robot_model
      default: rosbot_xl
      description: Specify robot model

  - set_env:
      name: RCUTILS_COLORIZED_OUTPUT
      value: '1'

  - set_env:
      name: RCUTILS_CONSOLE_OUTPUT_FORMAT
      value: '[{severity}] [{date_time_with_ms}] [{name}]: {message}'

  - log:
      message: Bringing up ROSbot XL, namespace=$(var namespace), configuration=base, led_strip=$(var
        led_strip)

  - push_ros_namespace:
      namespace: $(var namespace)

  - let:
      name: tf_namespace_bridge_config
      value: $(eval "('$(var config_dir)/rosbot_bringup' if '$(var config_dir)' else '$(find-pkg-share
        rosbot_bringup)') + '/config/tf_namespace_bridge.yaml'")

  - node:
      pkg: tf_namespace_bridge
      exec: tf_namespace_bridge
      if: $(eval '"$(var tf_namespace_bridge)" == "True" and "$(var namespace)" != ""')
      param:
        - from: $(var tf_namespace_bridge_config)

  - set_remap:
      from: /diagnostics
      to: diagnostics
  - set_remap:
      from: /tf
      to: tf
  - set_remap:
      from: /tf_static
      to: tf_static

  - include:
      file: $(find-pkg-share rosbot_bringup)/launch/$(var backend).launch.py
      if: $(var hardware_bridge)
      let:
        - name: robot_model
          value: $(var robot_model)

  - include:
      file: $(find-pkg-share rosbot_controller)/launch/controller.yaml

  - include:
      file: $(find-pkg-share rosbot_joy)/launch/joy.yaml

  - include:
      file: $(find-pkg-share rosbot_localization)/launch/ekf.yaml

#  Dont work in snap
#   - include:
#       file: $(find-pkg-share rosbot_utils)/launch/battery_alert.yaml
#       let:
#         - name: robot_model
#           value: $(var robot_model)

  - node:
      pkg: rosbot_utils
      exec: led_strip_car_wave
      if: $(eval '"$(var led_strip)" == "True"')
