---
launch:

  - arg:
      name: arm_activate
      default: 'True'
      description: Whether to activate the manipulator controllers
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: controller_manager_timeout
      default: '60'
      description: >-
        Seconds the spawner waits for controller_manager to load + activate the
        controllers. Raised from 20 for slower SBCs (see controller.yaml).

  - node:
      pkg: controller_manager
      exec: spawner
      args: >
        manipulator_controller
        gripper_controller
        -c controller_manager
        --controller-manager-timeout $(var controller_manager_timeout)
      if: $(var arm_activate)

  - node:
      pkg: controller_manager
      exec: spawner
      args: >
        manipulator_controller
        gripper_controller
        -c controller_manager
        --controller-manager-timeout $(var controller_manager_timeout)
        --inactive
      unless: $(var arm_activate)

  - include:
      file: $(find-pkg-share rosbot_moveit)/launch/move_group.launch.py

  - include:
      file: $(find-pkg-share rosbot_moveit)/launch/servo.launch.py

  - include:
      file: $(find-pkg-share rosbot_moveit)/launch/home.launch.py
      if: $(var arm_activate)
